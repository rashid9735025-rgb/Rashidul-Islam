<<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image Converter & Compressor</title>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Cropper -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; }

        .section {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #ccc;
        }

        .drop-zone {
            border: 2px dashed #007bff;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 15px;
            color: #007bff;
        }

        .preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .preview-img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 5px;
        }

        .pdf-thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 5px;
        }

        input[type="range"] {
            width: 100%;
        }

        .btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            background: #007bff;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Advanced Image Tools</h2>

    <!-- Section 1 -->
    <div class="section">
        <h3>Image to JPG, Crop & Compress</h3>

        <div class="drop-zone" onclick="document.getElementById('compressInput').click()">
            এখানে ছবি ক্লিক করে সিলেক্ট করুন
        </div>
        <input type="file" id="compressInput" accept="image/*" hidden>

        <div class="preview-container" id="preview1"></div>

        <button class="btn" onclick="compressImage()">Convert & Download JPG</button>
    </div>

    <!-- Section 2 -->
    <div class="section">
        <h3>Multiple Images to PDF</h3>

        <div class="drop-zone" onclick="document.getElementById('pdfInput').click()">
            একাধিক ছবি সিলেক্ট করুন
        </div>
        <input type="file" id="pdfInput" accept="image/*" multiple hidden>

        <div class="preview-container" id="preview2"></div>

        <button class="btn" onclick="convertToPDF()">Download PDF</button>
    </div>
</div>

<script>
let selectedImage = null;

document.getElementById("compressInput").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(event){
        selectedImage = event.target.result;
        document.getElementById("preview1").innerHTML =
            `<img src="${selectedImage}" class="preview-img">`;
    };
    reader.readAsDataURL(file);
});

function compressImage(){
    if(!selectedImage) {
        alert("প্রথমে ছবি সিলেক্ট করুন");
        return;
    }

    const img = new Image();
    img.src = selectedImage;
    img.onload = function(){
        const canvas = document.createElement("canvas");
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);

        const dataUrl = canvas.toDataURL("image/jpeg", 0.8);

        const link = document.createElement("a");
        link.href = dataUrl;
        link.download = "compressed.jpg";
        link.click();
    };
}

/* PDF Section */
let pdfFiles = [];

document.getElementById("pdfInput").addEventListener("change", function(e){
    pdfFiles = Array.from(e.target.files);
    const preview = document.getElementById("preview2");
    preview.innerHTML = "";

    pdfFiles.forEach(file=>{
        const reader = new FileReader();
        reader.onload = function(event){
            preview.innerHTML +=
                `<img src="${event.target.result}" class="pdf-thumbnail">`;
        };
        reader.readAsDataURL(file);
    });
});

async function convertToPDF(){
    if(pdfFiles.length === 0){
        alert("ছবি সিলেক্ট করুন");
        return;
    }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    for(let i=0;i<pdfFiles.length;i++){
        const dataUrl = await readFile(pdfFiles[i]);
        const img = await loadImg(dataUrl);

        const width = pdf.internal.pageSize.getWidth();
        const height = (img.height * width) / img.width;

        if(i>0) pdf.addPage();
        pdf.addImage(img, 'JPEG', 0, 0, width, height);
    }

    pdf.save("document.pdf");
}

function readFile(file){
    return new Promise(resolve=>{
        const reader = new FileReader();
        reader.onload = e=>resolve(e.target.result);
        reader.readAsDataURL(file);
    });
}

function loadImg(src){
    return new Promise(resolve=>{
        const img = new Image();
        img.onload = ()=>resolve(img);
        img.src = src;
    });
}
</script>

</body>
</html>!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <link rel="stylesheet" href="styles/style.css"/>
  <title>Hello, World!</title>
</head>
<body>
  <h1>
    Hello, World!
  </h1>
</body>
</html>
