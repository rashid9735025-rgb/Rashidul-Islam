<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #6366f1;
    --secondary: #a855f7;
    --bg: #f8fafc;
    --card-bg: rgba(255, 255, 255, 0.9);
    --text: #1e293b;
}

body.dark {
    --bg: #0f172a;
    --card-bg: rgba(30, 41, 59, 0.9);
    --text: #f1f5f9;
}

body {
    margin: 0;
    padding: 0;
    font-family: 'Hind Siliguri', 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    transition: 0.4s;
    overflow: hidden;
}

/* Particle Background */
#particles-js{
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: -1;
}

.container {
    width: 95%;
    max-width: 500px;
}

.card {
    background: var(--card-bg);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 30px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.2);
    text-align: center;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.theme-toggle {
    cursor: pointer;
    font-size: 1.5rem;
    background: rgba(0,0,0,0.05);
    width: 45px;
    height: 45px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
}

h1 {
    font-size: 1.8rem;
    margin: 0;
    background: linear-gradient(to right, #6366f1, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.input-group { margin-bottom: 25px; text-align: left; }

label {
    display: block;
    margin-bottom: 10px;
    font-weight: 600;
    font-size: 15px;
}

input[type="date"] {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: 2px solid rgba(0,0,0,0.1);
    background: rgba(255,255,255,0.5);
    color: var(--text);
    font-size: 16px;
}

button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(to right, #6366f1, #a855f7);
    color: white;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
}

.result-container {
    margin-top: 35px;
    display: none;
}

.stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.stat-box {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 18px;
    font-size: 14px;
}

.stat-box span {
    display: block;
    font-weight: 700;
    color: var(--primary);
    font-size: 18px;
    margin-top: 5px;
}

footer {
    margin-top: 30px;
    font-size: 13px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">
<div class="card">
<div class="header">
<h1>Hii Age Calculator</h1>
<div class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</div>
</div>

<div class="input-group">
<label for="dob">আপনার জন্ম তারিখ বেছে নিন</label>
<input type="date" id="dob">
</div>

<button onclick="calculateAge()">হিসাব করুন ✨</button>

<div class="result-container" id="resultContainer">
<div class="stats-grid">
<div class="stat-box">পরবর্তী জন্মদিন 🎂 <span id="nextBirthday">--</span></div>
<div class="stat-box">মোট দিন ☀️ <span id="totalDays">--</span></div>
</div>
</div>

<footer>© 2026 Pro Age Calculator | Design by Rashid</footer>
</div>
</div>

<script>
function toggleTheme(){
document.body.classList.toggle("dark");
document.getElementById("themeIcon").innerHTML =
document.body.classList.contains("dark") ? "☀️" : "🌙";
}

function calculateAge(){
const dob=document.getElementById("dob").value;
if(!dob) return alert("তারিখ দিন!");

const birthDate=new Date(dob);
const today=new Date();
const diff=today-birthDate;
const totalDays=Math.floor(diff/(1000*60*60*24));

let nextBday=new Date(today.getFullYear(),birthDate.getMonth(),birthDate.getDate());
if(nextBday<today) nextBday.setFullYear(today.getFullYear()+1);
const daysLeft=Math.ceil((nextBday-today)/(1000*60*60*24));

document.getElementById("totalDays").innerText=totalDays;
document.getElementById("nextBirthday").innerText=
daysLeft===0?"আজই শুভ দিন!":daysLeft+" দিন পর";

document.getElementById("resultContainer").style.display="block";
}
</script>

<!-- Particle Script -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js",{
particles:{
number:{value:90},
size:{value:3},
color:{value:"#ffffff"},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.3,
width:1
},
move:{enable:true,speed:2}
},
interactivity:{
events:{
onhover:{enable:true,mode:"repulse"}
}
}
});
</script>

</body>
</html>
